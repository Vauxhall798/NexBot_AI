# ── NexBot AI — Nginx Reverse Proxy ──────────────────────────────────────────
# Place this in /etc/nginx/sites-available/nexbot and symlink to sites-enabled
# Replace YOUR_DOMAIN with your actual domain name

# Rate limiting zone (10 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # ── API Reverse Proxy ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # ── Serve the JS plugin as a static CDN file ─────────────────────────
    location /plugin/ {
        alias /var/www/nexbot/plugin/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Dashboard downloads ──────────────────────────────────────────────
    location /downloads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}

