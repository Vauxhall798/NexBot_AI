# Render.com Blueprint — auto-configures the service on deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nexbot-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 main:app
    autoDeploy: false
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEXBOT_ADMIN_PASSWORD
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LICENSE_DB_PATH
        value: data/licenses.db
      - key: UPLOAD_DIR
        value: uploads
      - key: DOWNLOAD_DIR
        value: downloads
      - key: DATA_CACHE_TTL
        value: "300"
