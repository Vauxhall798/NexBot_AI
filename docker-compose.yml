# ── NexBot AI — Docker Compose ────────────────────────────────────────────────
# Usage:  docker compose up -d --build
# Stop:   docker compose down

version: "3.9"

services:
  nexbot-api:
    build: .
    container_name: nexbot-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ./data:/app/data        # SQLite license DB persists here
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

